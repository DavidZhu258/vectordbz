name: Source Connector Proposal
description: Propose a new evidence source for VectorDBZ v2
labels: ["source", "enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        v2 source connectors must improve judgment, not just add volume. Please explain quality, freshness, evidence fields, and failure behavior.

  - type: input
    id: source_name
    attributes:
      label: Source name
      placeholder: "e.g. GitHub Trending, HF models, Reddit r/LocalLLaMA"
    validations:
      required: true

  - type: input
    id: source_url
    attributes:
      label: Source URL or docs
      placeholder: "https://..."
    validations:
      required: true

  - type: textarea
    id: value
    attributes:
      label: Decision value
      description: What daily decision or research question does this source improve?
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence fields
      description: List the fields that should become citations or structured metadata.
    validations:
      required: true

  - type: dropdown
    id: criticality
    attributes:
      label: Failure behavior
      options:
        - Optional source, degrade only
        - Important source, warn if stale
        - Critical source, block publish when unavailable
    validations:
      required: true

  - type: textarea
    id: quality
    attributes:
      label: Quality and exclusion rules
      description: How should low-signal, duplicate, stale, or promotional records be filtered?
    validations:
      required: true
