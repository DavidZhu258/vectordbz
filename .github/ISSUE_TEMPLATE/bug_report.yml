name: Bug Report
description: Report a VectorDBZ v2 runtime, source, or UI issue
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please include enough non-secret context for us to reproduce the issue. Do not paste provider tokens, cookies, passwords, SSH details, or private database values.

  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: "e.g. v2.0 or commit SHA"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Source collector
        - Backfill
        - Embedding worker
        - Rerank worker
        - Trend report
        - Ask with citations API
        - Source health
        - Deployment
        - UI reuse
        - Other
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Local Windows
        - Local Linux
        - US server
        - HK server
        - 153 server
        - GitHub Actions
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Run ...
        2. Observe ...
        3. Expected ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant non-secret logs
      description: Redact keys, passwords, cookies, host credentials, and private data.
      render: shell
