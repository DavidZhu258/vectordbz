name: Feature Request
description: Suggest a focused VectorDBZ v2 improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        VectorDBZ v2 favors small, evidence-backed, maintainable features over broad feed expansion.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the current limitation or user pain.
    validations:
      required: true

  - type: textarea
    id: value
    attributes:
      label: Why is it high value?
      description: Explain how this improves precision, freshness, maintainability, cost, or cited Q&A.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Source quality
        - Evidence extraction
        - Ranking and report contract
        - Ask with citations
        - Long-task reliability
        - Deployment
        - UI reuse
        - Cost/performance
        - Documentation

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should change?
    validations:
      required: true

  - type: textarea
    id: tradeoffs
    attributes:
      label: Tradeoffs
      description: What complexity, cost, or operational risk does this add?
