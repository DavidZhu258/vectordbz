name: V2 Source Release

on:
  push:
    tags:
      - "v2.*"

permissions:
  contents: write

jobs:
  release:
    name: Package V2 Source
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -r deploy/vectordbz_v2/requirements.txt pytest

      - name: Verify v2 harness
        run: |
          python -m pytest tests/vectordbz_v2 -q
          python -m compileall vectordbz_v2

      - name: Secret pattern scan
        shell: bash
        run: |
          set -euo pipefail
          github_pat="github""_pat_"
          ghp="gh""p_"
          openrouter="sk-or-v1""-[0-9a-fA-F]{40,}"
          jina="ji""na_[A-Za-z0-9_-]{30,}"
          xai="xa""i-[A-Za-z0-9_-]{30,}"
          patterns="${github_pat}|${ghp}|${openrouter}|${jina}|${xai}"
          hits="$(git grep -I -l -E "$patterns" || true)"
          if [ -n "$hits" ]; then
            echo "Potential secret-bearing tracked files:"
            echo "$hits"
            exit 1
          fi

      - name: Build source archive
        run: |
          mkdir -p dist
          git archive --format=tar.gz --prefix="vectordbz-${GITHUB_REF_NAME}/" -o "dist/vectordbz-${GITHUB_REF_NAME}.tar.gz" HEAD

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: dist/*
