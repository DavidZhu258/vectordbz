name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  v2-harness:
    name: V2 Harness Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -r deploy/vectordbz_v2/requirements.txt pytest

      - name: Run v2 tests
        run: python -m pytest tests/vectordbz_v2 -q

      - name: Compile v2 package
        run: python -m compileall vectordbz_v2

  repository-hygiene:
    name: Repository Hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Secret pattern scan
        shell: bash
        run: |
          set -euo pipefail
          github_pat="github""_pat_"
          ghp="gh""p_"
          openrouter="sk-or-v1""-[0-9a-fA-F]{40,}"
          jina="ji""na_[A-Za-z0-9_-]{30,}"
          xai="xa""i-[A-Za-z0-9_-]{30,}"
          patterns="${github_pat}|${ghp}|${openrouter}|${jina}|${xai}"
          hits="$(git grep -I -l -E "$patterns" || true)"
          if [ -n "$hits" ]; then
            echo "Potential secret-bearing tracked files:"
            echo "$hits"
            exit 1
          fi

      - name: Generated artifact scan
        shell: bash
        run: |
          set -euo pipefail
          forbidden="$(git ls-files | grep -E '(^|/)(node_modules|\.next|\.vite|__pycache__|chroma_store)(/|$)|\.(tar|tar\.gz|zip|7z|png)$|(^|/)\.env$' || true)"
          if [ -n "$forbidden" ]; then
            echo "Generated or local-only tracked files:"
            echo "$forbidden"
            exit 1
          fi
