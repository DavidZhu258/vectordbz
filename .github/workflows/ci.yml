name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  v2-harness:
    name: V2 Harness Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -r deploy/vectordbz_v2/requirements.txt pytest

      - name: Run v2 tests
        run: python -m pytest tests/vectordbz_v2 -q

      - name: Compile v2 package
        run: python -m compileall vectordbz_v2

  integration-smoke:
    name: Integration Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.8
        env:
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: ci
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
        ports:
          - 8123:8123
          - 9000:9000
      qdrant:
        image: qdrant/qdrant:v1.12.6
        ports:
          - 6333:6333

    env:
      CLICKHOUSE_HOST: 127.0.0.1
      CLICKHOUSE_HTTP_PORT: "8123"
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ci
      QDRANT_HOST: 127.0.0.1
      QDRANT_PORT: "6333"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -r deploy/vectordbz_v2/requirements.txt pytest

      - name: Wait for services
        run: |
          python - <<'PY'
          import time
          import requests
          import clickhouse_connect

          deadline = time.time() + 90
          last_error = None

          while time.time() < deadline:
              try:
                  ch = clickhouse_connect.get_client(
                      host="127.0.0.1",
                      port=8123,
                      database="default",
                      username="default",
                      password="ci",
                  )
                  ch.command("SELECT 1")
                  resp = requests.get("http://127.0.0.1:6333/collections", timeout=3)
                  resp.raise_for_status()
                  print("services ready")
                  raise SystemExit(0)
              except Exception as exc:
                  last_error = exc
                  time.sleep(3)

          raise SystemExit(f"services not ready: {last_error!r}")
          PY

      - name: Initialize schema
        run: python -m vectordbz_v2.init_schema

      - name: Run smoke check
        run: python -m vectordbz_v2.test_smoke

      - name: Run API contract tests
        run: python -m pytest tests/vectordbz_v2/test_api.py tests/vectordbz_v2/test_evidence_contract.py -q

  repository-hygiene:
    name: Repository Hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Secret pattern scan
        shell: bash
        run: |
          set -euo pipefail
          github_pat="github""_pat_"
          ghp="gh""p_"
          openrouter="sk-or-v1""-[0-9a-fA-F]{40,}"
          jina="ji""na_[A-Za-z0-9_-]{30,}"
          xai="xa""i-[A-Za-z0-9_-]{30,}"
          patterns="${github_pat}|${ghp}|${openrouter}|${jina}|${xai}"
          hits="$(git grep -I -l -E "$patterns" || true)"
          if [ -n "$hits" ]; then
            echo "Potential secret-bearing tracked files:"
            echo "$hits"
            exit 1
          fi

      - name: Generated artifact scan
        shell: bash
        run: |
          set -euo pipefail
          forbidden="$(git ls-files | grep -E '(^|/)(node_modules|\.next|\.vite|__pycache__|chroma_store)(/|$)|\.(tar|tar\.gz|zip|7z|png)$|(^|/)\.env$' || true)"
          if [ -n "$forbidden" ]; then
            echo "Generated or local-only tracked files:"
            echo "$forbidden"
            exit 1
          fi

  ci-result:
    name: CI Result
    runs-on: ubuntu-latest
    needs:
      - v2-harness
      - integration-smoke
      - repository-hygiene
    if: always()
    timeout-minutes: 5

    steps:
      - name: Summarize checks
        run: |
          {
            echo "## VectorDBZ CI Result"
            echo
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| V2 Harness Tests | ${{ needs.v2-harness.result }} |"
            echo "| Integration Smoke | ${{ needs.integration-smoke.result }} |"
            echo "| Repository Hygiene | ${{ needs.repository-hygiene.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ needs.v2-harness.result }}" != "success" ] ||
             [ "${{ needs.integration-smoke.result }}" != "success" ] ||
             [ "${{ needs.repository-hygiene.result }}" != "success" ]; then
            exit 1
          fi
